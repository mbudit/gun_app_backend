services:
  backend:
    image: 192.168.50.50:5000/gun-app-backend:latest
    container_name: gun-app-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5002}:5002"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - TRIGGER_SECRET=${TRIGGER_SECRET:-changeme}
      - PORT=5002
    env_file:
      - .env
