stages:
  - test
  - build
  - deploy

variables:
  APP_DIR: backend

# ─── TEST ───────────────────────────────────────────────
test:
  stage: test
  image: node:20-alpine
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - $APP_DIR/node_modules/
  before_script:
    - cd $APP_DIR && npm ci
  script:
    - npm test
  only:
    - main
    - merge_requests

# ─── BUILD ──────────────────────────────────────────────
build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      command: ["--insecure-registry=gitlab.lan:5050"]  # can't use vars here
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -f $APP_DIR/Dockerfile $APP_DIR
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main

# ─── DEPLOY ─────────────────────────────────────────────
deploy:
  stage: deploy
  image: alpine
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 $DEPLOY_KEY
    - ssh-add $DEPLOY_KEY
  script:
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker compose -f /opt/$CI_PROJECT_NAME/docker-compose.yml pull &&
        docker compose -f /opt/$CI_PROJECT_NAME/docker-compose.yml up -d --remove-orphans &&
        docker image prune -f
      "
  only:
    - main