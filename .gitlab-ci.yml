stages:
  - test
  - build
  - deploy

# ─── TEST ───────────────────────────────────────────────
test:
  stage: test
  image: node:20-alpine
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - backend/node_modules/
  before_script:
    - cd backend && npm ci
  script:
    - cd backend && npm test
  only:
    - main
    - merge_requests

# ─── BUILD ──────────────────────────────────────────────
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build and tag with both the commit SHA and latest
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA ./backend
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest

    # Push both tags
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main

# ─── DEPLOY ─────────────────────────────────────────────
deploy:
  stage: deploy
  image: alpine
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 $DEPLOY_KEY
    - ssh-add $DEPLOY_KEY
  script:
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker compose -f /opt/myapp/docker-compose.yml pull &&
        docker compose -f /opt/myapp/docker-compose.yml up -d --remove-orphans &&
        docker image prune -f
      "
  only:
    - main