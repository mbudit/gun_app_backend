name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Allow insecure registry
        run: |
          echo '{"insecure-registries": ["${{ secrets.REGISTRY_HOST }}:5000"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 5

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.REGISTRY_HOST }}:5000/gun-app-backend:latest ./backend

      - name: Push to private registry
        run: |
          docker push ${{ secrets.REGISTRY_HOST }}:5000/gun-app-backend:latest

      - name: Deploy to backend server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/apps/gun-app-backend
            docker compose pull
            docker compose up -d
            docker image prune -f